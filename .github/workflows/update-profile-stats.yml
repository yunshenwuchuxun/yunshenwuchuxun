name: Update profile stats

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/readme-stats-action@v1
        with:
          card: stats
          username: yunshenwuchuxun
          path: generated/github-stats.svg
          options: theme=tokyonight&hide_border=true&show_icons=true&rank_icon=github

      - name: Generate top languages card
        uses: stats-organization/readme-stats-action@v1
        with:
          card: top-langs
          username: yunshenwuchuxun
          path: generated/top-langs.svg
          options: theme=tokyonight&hide_border=true&layout=compact&langs_count=8

      - name: Commit generated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/github-stats.svg generated/top-langs.svg
          git diff --cached --quiet || git commit -m "Update generated profile stats"
          git push
