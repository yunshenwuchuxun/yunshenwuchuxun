name: Update profile stats

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate profile summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
        with:
          USERNAME: yunshenwuchuxun
          BRANCH_NAME: main
          AUTO_PUSH: false
          THEME: github_dark

      - name: Prepare generated cards
        run: |
          mkdir -p generated
          cp profile-summary-card-output/github_dark/3-stats.svg generated/github-stats.svg
          cp profile-summary-card-output/github_dark/2-most-commit-language.svg generated/top-langs.svg

      - name: Commit generated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/github-stats.svg generated/top-langs.svg
          git diff --cached --quiet || git commit -m "Update generated profile stats"
          git push
